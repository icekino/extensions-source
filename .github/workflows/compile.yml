name: Manual Build

on:
  workflow_dispatch: # 允许你手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Komiic Extension
        # 这里的 :src:zh:komiic 对应你修改的插件路径
        run: ./gradlew :src:zh:komiic:assembleDebug 

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Komiic-APK
          path: src/zh/komiic/build/outputs/apk/debug/*.apk
